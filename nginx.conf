server {
    listen 9020;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Suporte a React Router (SPA) — redireciona tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets estáticos com cache longo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Desabilita logs de acesso para o favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
